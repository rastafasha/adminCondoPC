<body class="fix-header card-no-border">

    <div class="preloader">
        <div class="loader">
            <div class="loader__figure"></div>

    <!-- ============================================================== -->


    <script type="text/javascript">
        $(function () {
            $(".preloader").fadeOut();
        });
        $(function () {
            $('[data-toggle="tooltip"]').tooltip()
        });
        // ==============================================================
        // Login and Recover Password
        // ==============================================================
        $('#to-recover').on("click", function () {
            $("#loginform").slideUp();
            $("#recoverform").fadeIn();
        });
