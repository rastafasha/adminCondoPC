<aside class="left-sidebar">
    <!-- Sidebar scroll-->
    <div class="scroll-sidebar">
        <!-- Sidebar navigation-->
        <nav class="sidebar-nav">
            <ul id="sidebar-nav">
                <li class="nav-item">
                    <a class="nav-link collapsed cursor" routerLink="/">
                        <i class="fas fa-home"></i>
                        <span>Inicio</span>
                    </a>
                </li>
                <!-- End Dashboard Nav -->

                <!-- menu superadmin y admin -->

                <div *ngIf="user.role === 'SUPERADMIN_ROLE' || user.role === 'ADMIN_ROLE'  ">
                    <li class="nav-item">
                        <a class="nav-link collapsed cursor" routerLink="/dashboard/payments" routerLinkActive="active">
                            <i class="fas fa-chart-pie"></i>
                            <span>Pagos</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link collapsed cursor" routerLink="/dashboard/facturacion" routerLinkActive="active">
                            <i class="fas fa-chart-line"></i>
                            <span>Facturación</span>
                        </a>
                    </li>
                     <!-- <li class="nav-item">
                        <a class="nav-link collapsed cursor" routerLink="/dashboard/trasnferencias" routerLinkActive="active">
                            <i class="fas fa-money"></i>
                            <span>Transferencias</span>
                        </a>
                    </li> -->
                    <li class="nav-item">
                        <a class="nav-link collapsed cursor" routerLink="/dashboard/users" routerLinkActive="active">
                            <i class="fas fa-users"></i>
                            <span>Usuarios</span>
                        </a>
                    </li>
                    
                    
                    
                    <li class="nav-item">
                        <a class="nav-link collapsed cursor" [routerLink]="['/dashboard/profile/', user.uid]" routerLinkActive="active">
                            <i class="fas fa-user"></i>
                            <span>Mi Cuenta</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link collapsed cursor" routerLink="/dashboard/configuraciones" routerLinkActive="active">
                            <i class="fas fa-cogs"> </i>
                            <span>Configuraciones</span>
                        </a>
                    </li>
                    <!-- End Payments Page Nav -->
                </div>

                <!-- menu superadmin y admin -->


                <div *ngIf="user.role === 'USER_ROLE' ">
                    <li class="nav-item">
                        <a class="nav-link collapsed cursor" [routerLink]="['/dashboard/profile/', user.uid]" routerLinkActive="active">
                            <i class="fas fa-user-md"></i>
                            <span>Mi Cuenta</span>
                        </a>
                    </li>
                    
                    <!-- End Payments Page Nav -->
                </div>

                <!-- End Payments Page Nav -->

                    <a class="nav-link collapsed cursor" routerLink="/dashboard/help" routerLinkActive="active">

                        <span>Ayuda</span>
                    </a>
                </li> -->
                <!-- End F.A.Q Page Nav -->

                <!-- <li class="nav-item">
                    <a class="nav-link collapsed cursor" routerLink="/dashboard/contact" routerLinkActive="active">
                        <i class="fa fa-envelope"></i>
                        <span>Contacto</span>
                    </a>
                </li> -->

                <li class="nav-item">
                    <a class="nav-link collapsed cursor" (click)="logout()">
                        <i class="fas fa-power-off"></i>
                        <span>Salir</span>
                    </a>
                </li>
                <!-- End Contact Page Nav -->


            </ul>
        </nav>
        <!-- End Sidebar navigation -->
    </div>
    <!-- End Sidebar scroll-->
</aside>
