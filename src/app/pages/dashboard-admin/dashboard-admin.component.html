<!-- =======| Main |======= -->
<div class="container " id="main" class="main" role="main ">
    <div class="col-xs-12 ">
        <!-- Page Title -->
        <div class="pagetitle animated fadeIn">
            <div class="left">
                <h1><i class="bx bxs-user-account"></i> {{title}}</h1>
                <nav>
                    <ol class="breadcrumb">
                        <!-- <li class="breadcrumb-item"><a routerLink="/"><i class="bi bi-house"></i> Inicio</a></li> -->
                        <li class="breadcrumb-item active">{{title}}</li>
                    </ol>
                </nav>
            </div>
            <app-tasadiabcv></app-tasadiabcv>
            <div class="right shadow animated fadeIn">
                <p>Bienvenido: {{user.username}}!</p>

                <span class="badge bg-dark" *ngIf="user.role === 'SUPERADMIN_ROLE'">SuperAdmin</span>
                <span class="badge bg-primary" *ngIf="user.role === 'ADMIN_ROLE'">Admin</span>
                <p>Ten un Excelente y Productivo día!</p>
            </div>
        </div>
        <div class="clear"></div>
        <div class="row mt-3">
            <div class="d-flex justify-content-end gap-3">
                <a href="javascript:;" (click)="PageSize()" class="btn btn-primary doctor-refresh ms-2 "><i
                        class="fa fa-refresh"></i></a>
            </div>
        </div>
        <div class="clear"></div>
        <div class="row mt-3">
            <div class="col-xs-12 col-sm-8">
                <h3>Proyectos Aprobados</h3>
                <app-line-chart [payments]="payments"></app-line-chart>
            </div>
            <div class="col-xs-12 col-sm-4">
                <h3>Propuestas Enviadas</h3>
                <app-pie-chart2 [payments]="payments"></app-pie-chart2>
            </div>
        </div>
        <!-- acceso iconos -->
        <app-menuiconos></app-menuiconos>
        <!-- acceso iconos -->
        <!-- <app-project-list [displaycomponent]="displaycomponent" [limit]="limit"></app-project-list> -->
        <app-payments [displaycomponent]="displaycomponent" [limit]="limit"></app-payments>
        <!-- End Page Title -->


    </div>



</div>
<!--/main-->
<app-modal-inicial></app-modal-inicial>
