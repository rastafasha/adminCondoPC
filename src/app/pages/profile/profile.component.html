<!-- =======| Main |======= -->
<div class="container animated fadeInUp" id="main" class="main" role="main" name="profile">

    <div class="col-xs-12">
        <div class="leftside">
            <!-- Page Title -->
            <div class="pagetitle">
                <h1><i class="bx bxs-user-account"></i> Mi Perfil </h1>
                <nav>
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a routerLink="/"><i class="fa fa-home"></i> Inicio</a></li>
                        <li class="breadcrumb-item active">Mi Perfil</li>
                    </ol>
                </nav>
            </div>
            <!-- End Page Title -->
            <div class="buton">
                <button class="btn btn-outline-danger pull-right" href="javascript:void(0)"
                    (click)="goBack()">Volver</button>
            </div>
        </div>

        <div class="clear"></div>

        <section class="section profile">
            <div class="row">
                <div class="col-xs-12 cols-sm-12 col-md-4 col-xl-4">

                    <div class="card">
                        <div class="card-body profile-card pt-4  fichasmall">
                            
                            <div *ngIf="profileSeleccionado ">
                                <img [src]="(profile.img ?? '') | imagenPipe: 'profiles'" [alt]="user.username"
                                    class="rounded-circle">
                            </div>
                            <div class="inffichasmall">
                                <h2>{{user.username}}</h2>
                                <p>{{user.email}}</p>

                                <span class="badge bg-dark-light" *ngIf="user.role === 'SUPERADMIN_ROLE'">SuperAdmin</span>
                                <span class="badge bg-primary" *ngIf="user.role === 'ADMIN_ROLE'">Admin</span>
                                <span class="badge bg-secondary" *ngIf="user.role === 'USER_ROLE'">Invitado</span>
                            </div>


                        </div>
                    </div>

                </div>

                <div class="col-xs-12 col-sm-12 col-md-8 col-xl-8">

                    <div class="card">
                        <div class="card-body pt-3">
                            <!-- Bordered Tabs -->
                            <ul class="nav nav-tabs nav-tabs-bordered">
                                <li class="nav-item">
                                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#perfil">Mi
                                        perfil</button>
                                </li>

                                    <button class="nav-link " data-bs-toggle="tab" data-bs-target="#subcriptions">Mis
                                        Subcripciones</button>
                                </li>
                                <li class="nav-item">
                                    <button class="nav-link "
                                        *ngIf="usuario.role === 'PARTNER'|| usuario.role === 'SUPERADMIN' || usuario.role === 'ADMIN'"
                                        data-bs-toggle="tab" data-bs-target="#blogs">Mis Blogs Creados</button>
                                </li> -->
                                <!-- <li class="nav-item">
                                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#profile-change-password">CambiarContraseña</button>
                                </li> -->

                            </ul>
                            <div class="tab-content pt-2">

                                <div class="tab-pane fade show active perfil" id="perfil">


                                    <form class="form-horizontal form-material" (ngSubmit)="guardarPerfil()"
                                        [formGroup]="perfilForm">
                                        <div class="row">


                                            <div class="col-xs-12 col-sm-6 col-md-8">
                                                <div class="col-xs-12 col-md-6">
                                                    <label>Nombres <span class="required">*</span></label>
                                                    <input type="text" formControlName="first_name" class="form-control"
                                                        required>

                                                </div>
                                                <div class="col-xs-12 col-md-6">
                                                    <label>Apellidos <span class="required">*</span></label>
                                                    <input type="text" formControlName="last_name" class="form-control"
                                                        required>

                                                </div>


                                                <div class="col-xs-12 col-md-6">
                                                    <label for="exampleInputEmail1">Teléfonos Principal <span
                                                            class="required">*</span></label>
                                                    <input type="text" formControlName="telhome" class="form-control"
                                                        required>

                                                </div>
                                                <div class="col-xs-12 col-md-6">
                                                    <label for="exampleInputEmail1">Teléfonos Móvil </label>
                                                    <input type="text" formControlName="telmovil" class="form-control">

                                                </div>
                                                <div class="clear"></div>
                                                <!----//-->
                                            </div>
                                           

                                        </div>

                                        <input type="hidden" formControlName="id">
                                        <button class="btn btn-outline-success waves-effect waves-light m-r-10"
                                            type="submit" (click)="guardarPerfil()">Guardar</button>


                                    </form>


                                </div>
                                <div class="tab-pane fade show  profile-change-password" id="profile-change-password">

                                </div>

                            </div>
                            <!-- End Bordered Tabs -->


                        </div>
                    </div>

                </div>
            </div>
        </section>
    </div>

</div>
