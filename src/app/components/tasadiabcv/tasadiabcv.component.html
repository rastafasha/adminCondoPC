<!-- <app-loading *ngIf="isLoading"></app-loading> -->
<div class="row shadow animated fadeIn" style="background-color: #f2f2f2;" >
    <app-loading *ngIf="isLoading"></app-loading>
    <div  *ngIf="!precio_dia && !isLoading">
       Favor Actualizar Tasa del día 
       <button type="button" class="btn btn-outline-warning btn-sm" routerLink="../dashboard/tasaBCV">
        Actualizar tasa
       </button>
    </div>
    <div class="preciodia"  *ngIf="precio_dia && !isLoading">
        <div class="fas fa-bar-chart fa-2x" style="color: var(--azulclaro);"></div>
        <div class="inf">
            <h4>Feliz día, {{user.name}}!</h4>
       <p>La Tasa BCV del día es: <br> {{precio_fecha | date:'MMM d, y, h:mm:ss a'}} <br>
        <strong>{{precio_dia|currency:'Bs.'}} x $</strong></p>
        <div class="clear"></div>
        <button class="btn btn-outline-info btn-sm" routerLink="../dashboard/tasaBCV">
            Actualizar Tasa
        </button>
        </div>
        
    </div>
</div>
