<!-- Modal -->
<div class="modal fade" id="infoModal" tabindex="-1" aria-labelledby="infoModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title"><i class="bi bi-layers"></i> Información</h5>
        <button type="button" class="btn-close" (click)="onClose()" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div [innerHTML]="info"></div>
      </div>
      <div class="modal-footer botonesmodal">
        <button type="button" class="btn btn-success" (click)="onClose()" data-bs-dismiss="modal">Continuar</button>
        <button type="button" class="btn btn-outline-danger" (click)="onNoShowMore()">No quiero ver más este
          mensaje</button>
      </div>
    </div>
  </div>
</div>
