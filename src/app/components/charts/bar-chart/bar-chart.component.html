<div class="card border-radio shadow p-4">
  <!-- Filtros -->
  <div class="row mb-4 align-items-end" *ngIf="!isLoading">
    <div class="col-md-4">
      <label class="form-label fw-bold text-muted small">MES</label>
      <select class="form-select shadow-sm" [(ngModel)]="selectedMonth" (change)="onMonthChange(selectedMonth)">
        <option *ngFor="let month of months; let i = index" [value]="i + 1">
          {{ month }}
        </option>
      </select>
    </div>
    
    <div class="col-md-4">
      <label class="form-label fw-bold text-muted small">AÑO</label>
      <select class="form-select shadow-sm" [(ngModel)]="selectedYear" (change)="onYearChange(selectedYear)">
        <option *ngFor="let year of years" [value]="year">{{ year }}</option>
      </select>
    </div>

    <div class="col-md-4">
      <button class="btn btn-outline-primary w-100 shadow-sm" (click)="loadData()">
        <i class="bi bi-arrow-clockwise me-1"></i> Actualizar
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-grow text-primary" role="status"></div>
    <p class="mt-2 text-muted">Generando reporte administrativo...</p>
  </div>

  <!-- Chart & Empty State -->
  <div class="mt-2" style="position: relative; min-height: 350px;">
    <!-- Mensaje si no hay datos -->
    <div *ngIf="!reportData && !isLoading" class="text-center py-5 bg-light rounded border-dashed">
      <i class="bi bi-bar-chart text-muted display-4"></i>
      <p class="mt-3 mb-1 fw-bold">Sin movimientos registrados</p>
      <small class="text-muted">{{ months[selectedMonth - 1] }} {{ selectedYear }}</small>
    </div>

    <!-- Canvas -->
    <div [hidden]="!reportData || isLoading" style="height: 350px;">
      <canvas id="barChart"></canvas>
    </div>
  </div>
</div>
